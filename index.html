<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSCLE CHEAT - AI Workout Routine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="auth-bar" id="auth-bar">
                <span id="welcome-msg" class="hidden"></span>
                <button id="btn-login-modal" class="auth-btn">Login</button>
                <button id="btn-logout" class="auth-btn hidden">Logout</button>
                <button id="btn-my-routines" class="auth-btn hidden">My Routines</button>
            </div>
            <h1>MUSCLE CHEAT</h1>
            <p>AI-Powered Precision Workout Routine Generator</p>
        </header>
        
        <main>
            <section class="input-section">
                <form id="routine-form">
                    <div class="section-title">Body Profile</div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="age">Age</label>
                            <input type="number" id="age" value="35" required>
                        </div>
                        <div class="form-group">
                            <label for="height">Height (cm)</label>
                            <input type="number" id="height" value="175" required>
                        </div>
                        <div class="form-group">
                            <label for="weight">Weight (kg)</label>
                            <input type="number" id="weight" value="75" required>
                        </div>
                        <div class="form-group">
                            <label for="bmi">BMI (Auto)</label>
                            <input type="text" id="bmi" readonly class="highlight-input">
                        </div>
                    </div>

                    <div class="section-title" style="margin-top: 1.5rem;">Training Goals</div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="level">Experience Level</label>
                            <select id="level" required>
                                <option value="초급">Beginner (Under 1 year)</option>
                                <option value="중급" selected>Intermediate (1-3 years)</option>
                                <option value="고급">Advanced (3+ years)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="goal">Primary Goal</label>
                            <select id="goal" required>
                                <option value="근비대" selected>Hypertrophy (Muscle Growth)</option>
                                <option value="다이어트">Fat Loss (Cutting)</option>
                                <option value="스트렝스">Strength (Power)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="frequency">Weekly Frequency</label>
                            <select id="frequency" required>
                                <option value="3" selected>3 days/week</option>
                                <option value="4">4 days/week</option>
                                <option value="5">5 days/week</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">Session Duration</label>
                            <select id="duration" required>
                                <option value="40">40 min</option>
                                <option value="60" selected>60 min</option>
                                <option value="90">90 min</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="generate-btn">
                        <span>Generate My Routine</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>
            </section>
            
            <section id="result-section" class="result-section hidden">
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p>Analyzing your profile and building the optimal routine...</p>
                </div>
                <div id="routine-content" class="hidden">
                    <!-- Routine will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Login/Signup Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Quick Login</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="Enter your nickname" required>
                <button type="submit" id="auth-submit-btn">Start Training</button>
            </form>
        </div>
    </div>
    
    <!-- My Routines Modal -->
    <div id="routines-modal" class="modal hidden">
        <div class="modal-content large-modal">
            <span class="close-routines-modal">&times;</span>
            <h2>My Saved Routines</h2>
            <div id="saved-routines-container">
                <p>Loading...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
