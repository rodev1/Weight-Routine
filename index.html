<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSCLE CHEAT - AI Workout Routine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="auth-bar" id="auth-bar">
                <span id="welcome-msg" class="hidden"></span>
                <button id="btn-login-modal" class="auth-btn">로그인</button>
                <button id="btn-logout" class="auth-btn hidden">로그아웃</button>
                <button id="btn-my-routines" class="auth-btn hidden">내 루틴</button>
            </div>
            <h1>MUSCLE CHEAT</h1>
            <p>내 몸에 딱 맞는 운동 루틴 만들기</p>
        </header>
        
        <main>
            <section class="input-section">
                <form id="routine-form">
                    <div class="section-title">신체 정보</div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="age">나이</label>
                            <input type="number" id="age" value="35" required>
                        </div>
                        <div class="form-group">
                            <label for="height">키 (cm)</label>
                            <input type="number" id="height" value="175" required>
                        </div>
                        <div class="form-group">
                            <label for="weight">체중 (kg)</label>
                            <input type="number" id="weight" value="75" required>
                        </div>
                        <div class="form-group">
                            <label for="bmi">BMI (자동)</label>
                            <input type="text" id="bmi" readonly class="highlight-input">
                        </div>
                    </div>

                    <div class="section-title" style="margin-top: 1.5rem;">운동 목표</div>
                    <div class="input-grid">
                        <div class="form-group">
                            <label for="level">운동 경력</label>
                            <select id="level" required>
                                <option value="초급">초급 (1년 미만)</option>
                                <option value="중급" selected>중급 (1~3년)</option>
                                <option value="고급">고급 (3년 이상)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="goal">목표</label>
                            <select id="goal" required>
                                <option value="근비대" selected>근육 키우기</option>
                                <option value="다이어트">체지방 빼기</option>
                                <option value="스트렝스">힘 기르기</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="frequency">주간 횟수</label>
                            <select id="frequency" required>
                                <option value="3" selected>주 3회</option>
                                <option value="4">주 4회</option>
                                <option value="5">주 5회</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="duration">운동 시간</label>
                            <select id="duration" required>
                                <option value="40">40분</option>
                                <option value="60" selected>60분</option>
                                <option value="90">90분</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="generate-btn">
                        <span>루틴 만들기</span>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </form>
            </section>
            
            <section id="result-section" class="result-section hidden">
                <div class="loader" id="loader">
                    <div class="spinner"></div>
                    <p>당신만을 위한 루틴을 짜는 중...</p>
                </div>
                <div id="routine-content" class="hidden">
                    <!-- Routine will be rendered here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Login/Signup Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">닉네임 입력</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="닉네임을 입력하세요" required>
                <button type="submit" id="auth-submit-btn">시작하기</button>
            </form>
        </div>
    </div>
    
    <!-- My Routines Modal -->
    <div id="routines-modal" class="modal hidden">
        <div class="modal-content large-modal">
            <span class="close-routines-modal">&times;</span>
            <h2>저장한 루틴</h2>
            <div id="saved-routines-container">
                <p>불러오는 중...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
